<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 400" width="100%" height="100%">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f5f7fa"/>
      <stop offset="100%" stop-color="#e4e8ed"/>
    </radialGradient>

    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="5" dy="15" stdDeviation="12" flood-color="#000000" flood-opacity="0.25" />
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.15" />
    </filter>

    <filter id="inner-shadow">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="2" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="black" flood-opacity="0.6" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>

    <filter id="led-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      .label { font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 9px; letter-spacing: 0.5px; }
      .title { font-family: 'Arial', sans-serif; font-weight: 900; font-size: 11px; letter-spacing: 0.8px; }
      .sub-title { font-family: 'Arial', sans-serif; font-size: 11px; font-weight: bold; }
      .value { font-family: 'Courier New', Courier, monospace; font-size: 9px; font-weight: bold; }
      .footer-text { font-family: 'Arial', sans-serif; font-size: 8px; font-weight: bold; letter-spacing: 2px; opacity: 0.15; }
      .switch-text { font-family: 'Arial', sans-serif; font-size: 16px; font-weight: 900; letter-spacing: 1px; }
      .switch-sub { font-family: 'Courier New', Courier, monospace; font-size: 5px; opacity: 0.3; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-glow)" />

