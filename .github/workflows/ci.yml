# This workflow installs dependencies, runs tests and lints
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python
name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6.0.2
    - name: Install Qt system dependencies
      # PyQt6 needs these shared libraries even in headless CI.
      # Without them, importing QtGui fails with: libEGL.so.1 not found
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libegl1 \
          libgl1 \
          libxkbcommon0 \
          libdbus-1-3
    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
    - name: Set up Python 3.11
      run: uv python install 3.11
    - name: Install dependencies
      run: uv sync
    - name: Lint with ruff
      run: uv run ruff check .
    - name: Test with pytest
      # QT_QPA_PLATFORM=offscreen tells Qt to run without a display.
      # Required for GUI tests in headless CI environments.
      run: uv run pytest
      env:
        QT_QPA_PLATFORM: offscreen